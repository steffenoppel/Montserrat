name: ANNUAL BIRD TREND ANALYSIS

concurrency:
  group: montserrat-main-writer
  cancel-in-progress: false

on:
  push:
    paths:
      - 'Montserrat/data/**'
  workflow_dispatch:
    inputs:
      iter:
        description: "Number of samples for each N-mixture model in NIMBLE"
        required: true
        default: "250000"
      burnin:
        description: "Number of burn-in iterations for each N-mixture model in NIMBLE"
        required: true
        default: "100000"
      chains:
        description: "Number of chains for each N-mixture model in NIMBLE"
        required: true
        default: "3"

jobs:

# ---------------------------------------------------------------------
# 1. DATA PREPARATION
# ---------------------------------------------------------------------
  job_data_preparation:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("tidyverse","data.table","nimble"))'

      - name: Run data preparation
        run: |
          Rscript Montserrat_forest_bird_monitoring_data_prep.R

      - name: Upload prepared data
        uses: actions/upload-artifact@v4
        with:
          name: prepared-annual-data
          path: data/MONTSERRAT_ANNUAL_DATA_INPUT.RData


# ---------------------------------------------------------------------
# 2. NIMBLE INPUT PREPARATION
# ---------------------------------------------------------------------
  job_data_preparation_nimble:
    runs-on: macos-latest
    needs: job_data_preparation
    steps:
      - uses: actions/checkout@v3
      - uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("tidyverse","data.table","nimble"))'

      - name: Download prepared data
        uses: actions/download-artifact@v4
        with:
          name: prepared-annual-data
          path: data/

      - name: Run NIMBLE prep
        run: |
          Rscript Montserrat_forest_bird_monitoring_data_prep_Nmix_model_def_nimble.R \
            ${{ github.event.inputs.iter }} \
            ${{ github.event.inputs.burnin }} \
            ${{ github.event.inputs.chains }}

      - name: Upload NIMBLE input
        uses: actions/upload-artifact@v4
        with:
          name: nimble-input
          path: data/Montserrat_forest_bird_monitoring_yearly_NIMBLE_model_data.RData


# ---------------------------------------------------------------------
# 3. RUN N-MIX MODELS (MATRIX)
# ---------------------------------------------------------------------
  job_run_Nmix_model:
    runs-on: macos-latest
    needs: job_data_preparation_nimble
    strategy:
      matrix:
        SPECIES: ["MTOR","FOTH","BRQD","TREM","ACHU","PTCA","PETH","GTCA","SBTH","SNPI","CAEL","BANA"]

    steps:
      - uses: actions/checkout@v3
      - uses: r-lib/actions/setup-r@v2

      - name: Set YEAR
        run: |
          echo "YEAR=$(date +%Y)" >> $GITHUB_ENV

      - name: Download NIMBLE input
        uses: actions/download-artifact@v4
        with:
          name: nimble-input
          path: data/

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("tidyverse","data.table","nimble","lubridate","MCMCvis"))'

      - name: Create year-specific model output directory
        run: |
          mkdir -p output/models/${{ env.YEAR }}

      - name: Run NIMBLE model
        run: |
          Rscript Montserrat_forest_bird_monitoring_run_Nmix_nimble.R ${{ matrix.SPECIES }}

      - name: Upload model outputs
        uses: actions/upload-artifact@v4
        with:
          name: model-output-${{ matrix.SPECIES }}
          path: |
            output/models/${{ env.YEAR }}/*.rds
            output/models/${{ env.YEAR }}/*.csv


# ---------------------------------------------------------------------
# 4. MERGE MODEL OUTPUTS AND COMMIT
# ---------------------------------------------------------------------
  job_merge_outputs_and_commit:
    runs-on: ubuntu-latest
    needs: job_run_Nmix_model

    steps:
      - uses: actions/checkout@v3

      - name: Set YEAR
        run: |
          echo "YEAR=$(date +%Y)" >> $GITHUB_ENV

      - name: Create year-specific model directory
        run: |
          mkdir -p output/models/${{ env.YEAR }}

      - name: Download all model outputs
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Move model outputs into repository
        run: |
          find artifacts -type f \( -name "*.rds" -o -name "*.csv" \) \
            -exec mv {} output/models/${{ env.YEAR }}/ \;

      - name: Verify model outputs
        run: |
          ls -lh output/models/${{ env.YEAR }}
          test "$(ls -A output/models/${{ env.YEAR }} | wc -l)" -gt 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push model outputs
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_Montserrat }}
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          git add output/models/${{ env.YEAR }}/
          git commit -m "Add Nmix model outputs for ${{ env.YEAR }}" || echo "No changes"
          git push origin main


# ---------------------------------------------------------------------
# 5. CREATE SUMMARY REPORTS AND COMMIT
# ---------------------------------------------------------------------
  job_create_plot_report:
    runs-on: macos-latest
    needs: job_merge_outputs_and_commit
  
    steps:
      - uses: actions/checkout@v3
  
      - name: Update repository to include model outputs
        run: |
          git fetch origin main
          git checkout main
          git pull origin main
  
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-pandoc@v2
  
      - name: Set YEAR
        run: |
          echo "YEAR=$(date +%Y)" >> $GITHUB_ENV
  
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("tidyverse","data.table","rmarkdown","knitr","kableExtra","nimble"))'
  
      - name: Run report generation
        run: |
          Rscript Montserrat_forest_bird_monitoring_create_summary_table_plot_report.R
  
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
  
      - name: Commit and push reports
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_Montserrat }}
        run: |
          git fetch origin main
          git checkout main
          git pull origin main
  
          # Year-specific reports (accumulating)
          git add output/reports/
          
          # Annual summary tables (overwritten each year)
          git add output/Annual_estimates.csv
          git add output/Annual_estimates_mapdata.csv
          git add output/Trend_estimates.csv
          git commit -m "Add annual reports for ${{ env.YEAR }}" || echo "No changes"
          git push origin main
